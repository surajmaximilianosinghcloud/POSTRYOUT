<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6C63FF" />
  <meta name="description" content="Juego educativo sobre la historia de Rosario de la Frontera, Salta, Argentina. Creado por Suraj Maximiliano Singh." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Historia de Rosario de la Frontera 🏔️</title>

  <!-- Fuente Nunito desde Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Hoja de estilos principal -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════
       CONTENEDOR PRINCIPAL
       Todas las pantallas viven aquí. Solo una está visible
       a la vez gracias a la clase .active gestionada por ui.js
  ══════════════════════════════════════════════════════════ -->
  <div id="app">

    <!-- ── 🏠 INICIO ────────────────────────────────────────── -->
    <section id="screen-home" class="screen" role="main" aria-label="Pantalla de inicio">
      <!-- El contenido se genera dinámicamente por UI.renderHome() -->
    </section>

    <!-- ── 📚 SELECCIÓN DE CAPÍTULOS ────────────────────────── -->
    <section id="screen-chapters" class="screen" role="main" aria-label="Selección de capítulos">
      <!-- El contenido se genera dinámicamente por UI.renderChapters() -->
    </section>

    <!-- ── 📖 HISTORIA / NARRACIÓN ───────────────────────────── -->
    <section id="screen-story" class="screen" role="main" aria-label="Historia del capítulo">
      <!-- El contenido se genera dinámicamente por UI.renderStory() -->
    </section>

    <!-- ── 🎮 MINIJUEGO ──────────────────────────────────────── -->
    <section id="screen-minigame" class="screen" role="main" aria-label="Minijuego educativo">
      <!-- El contenido se genera dinámicamente por UI.renderMinigame() -->
    </section>

    <!-- ── ❓ QUIZ ────────────────────────────────────────────── -->
    <section id="screen-quiz" class="screen" role="main" aria-label="Quiz de preguntas">
      <!-- El contenido se genera dinámicamente por UI.renderQuiz() -->
    </section>

    <!-- ── 🏅 RESULTADO Y MEDALLA ────────────────────────────── -->
    <section id="screen-result" class="screen" role="main" aria-label="Resultado y medalla">
      <!-- El contenido se genera dinámicamente por UI.renderResult() -->
    </section>

    <!-- ── 📊 PROGRESO ───────────────────────────────────────── -->
    <section id="screen-progress" class="screen" role="main" aria-label="Pantalla de progreso">
      <!-- El contenido se genera dinámicamente por UI.renderProgress() -->
    </section>

    <!-- ── ⚙️ CONFIGURACIÓN ──────────────────────────────────── -->
    <section id="screen-settings" class="screen" role="main" aria-label="Configuración">
      <!-- El contenido se genera dinámicamente por UI.renderSettings() -->
    </section>

    <!-- ── ℹ️ CRÉDITOS ────────────────────────────────────────── -->
    <section id="screen-credits" class="screen" role="main" aria-label="Créditos del juego">
      <!-- El contenido se genera dinámicamente por UI.renderCredits() -->
    </section>

  </div><!-- /#app -->


  <!-- ══════════════════════════════════════════════════════════
       SCRIPTS – orden de carga importante:
       1. storage.js  → manejo de localStorage (sin dependencias)
       2. quiz.js     → banco de preguntas     (sin dependencias)
       3. game.js     → lógica de minijuegos   (sin dependencias)
       4. ui.js       → renderizado de pantallas (usa Storage, Game, QuizData)
       5. app.js      → controlador principal   (usa todo lo anterior)
  ══════════════════════════════════════════════════════════ -->
  <script src="js/storage.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
